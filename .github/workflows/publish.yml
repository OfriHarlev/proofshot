name: Publish to NPM

on:
  push:
    branches: [main]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # First, verify the build works
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for semantic-release to analyze commits
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/bin/proofshot.js || exit 1
          test -f dist/src/index.js || exit 1

      - name: Verify packed CLI install
        run: |
          npm pack
          npm install -g ./proofshot-*.tgz
          proofshot --version

      - name: Run tests
        run: npm test

  # Publish after build succeeds
  publish:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required for pushing tags and releases
      issues: write # Required for commenting on issues
      pull-requests: write # Required for commenting on PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx --package semantic-release@24 --package @semantic-release/changelog --package @semantic-release/git --package conventional-changelog-conventionalcommits semantic-release
